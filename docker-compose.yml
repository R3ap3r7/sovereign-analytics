services:
  postgres:
    image: postgres:16
    container_name: sovereign-analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sovereign_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sovereign_analytics_pgdata:/var/lib/postgresql/data

volumes:
  sovereign_analytics_pgdata:
